name: Monthly Cache Update to Hugging Face

on:
  schedule:
    - cron: '0 2 22 * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Year (leave blank = current year)'
        required: false
        default: ''
      month:
        description: 'Month 1-12 (leave blank = current month)'
        required: false
        default: ''
      skip_prices:
        description: 'Skip price update from data.gov.in?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force_deploy:
        description: 'Force full deployment (not just cache)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout Crop_geniues repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: 'backend/crop_price_v2/requirements.txt'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/crop_price_v2/requirements.txt
          pip install huggingface_hub

      - name: Check NDVI data availability
        run: |
          if [ -f "datasets/crop_price_v2/NDVI/gujarat_monthly_ndvi_clean_2005_2024_final.csv" ]; then
            echo "✓ NDVI CSV file found"
            LATEST_DATE=$(python3 -c "import pandas as pd; df=pd.read_csv('datasets/crop_price_v2/NDVI/gujarat_monthly_ndvi_clean_2005_2024_final.csv'); print(df['date'].max())" 2>/dev/null || echo "unknown")
            echo "Latest NDVI data: $LATEST_DATE"
          else
            echo "⚠ NDVI CSV not found"
          fi

      - name: Update monthly cache
        working-directory: backend/crop_price_v2
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
        run: |
          ARGS="--yes"
          YEAR="${{ github.event.inputs.year }}"
          MONTH="${{ github.event.inputs.month }}"
          [ -n "$YEAR" ] && ARGS="$ARGS --year $YEAR"
          [ -n "$MONTH" ] && ARGS="$ARGS --month $MONTH"
          [ "${{ github.event.inputs.skip_prices }}" = "true" ] && ARGS="$ARGS --rainfall-only"

          echo "Running: python update_monthly_cache.py $ARGS"
          python update_monthly_cache.py $ARGS

      - name: Verify cache files
        run: |
          PRICE_COUNT=$(find backend/crop_price_v2/monthly_cache/prices -name "*.json" 2>/dev/null | wc -l || echo 0)
          RAIN_COUNT=$(find backend/crop_price_v2/monthly_cache/rainfall -name "*.json" 2>/dev/null | wc -l || echo 0)
          NDVI_COUNT=$(find backend/crop_price_v2/monthly_cache/ndvi -name "*.json" 2>/dev/null | wc -l || echo 0)

          echo "price_count=$PRICE_COUNT" >> $GITHUB_ENV
          echo "rain_count=$RAIN_COUNT" >> $GITHUB_ENV
          echo "ndvi_count=$NDVI_COUNT" >> $GITHUB_ENV

          echo "Price files: $PRICE_COUNT"
          echo "Rainfall files: $RAIN_COUNT"
          echo "NDVI files: $NDVI_COUNT"

      - name: Prepare deployment files
        run: |
          mkdir -p hf_deploy
          cp -r backend/crop_price_v2/monthly_cache hf_deploy/
          cp backend/crop_price_v2/app.py hf_deploy/ || true
          cp -r backend/crop_price_v2/src hf_deploy/ || true
          cp backend/crop_price_v2/district_latlon.csv hf_deploy/ || true
          cp backend/crop_price_v2/README_HF.md hf_deploy/README.md || true
          cp backend/crop_price_v2/requirements_hf.txt hf_deploy/requirements.txt || true

          if [ "${{ github.event.inputs.force_deploy }}" = "true" ]; then
            cp -r backend/crop_price_v2/production_model hf_deploy/ || true
            cp -r datasets/crop_price_v2/processed hf_deploy/processed || true
          fi

      - name: Upload to Hugging Face Space
        working-directory: backend/crop_price_v2
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FORCE_DEPLOY: ${{ github.event.inputs.force_deploy }}
        run: |
          python ci_upload_to_hf.py

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## Monthly Cache Update Summary"
            echo ""
            echo "- Prices: ${price_count:-0}"
            echo "- Rainfall: ${rain_count:-0}"
            echo "- NDVI: ${ndvi_count:-0}"
          } >> $GITHUB_STEP_SUMMARY
